name: seattle-food-trucks
sourceRole: venue
description: "Seattle Food Trucks"
url: "https://www.seattlefoodtruck.com/api/events"
friendlyLink: "https://www.seattlefoodtruck.com"
imageUrl: "https://upload.wikimedia.org/wikipedia/commons/3/3b/Maximus_Minimus_food_truck_Seattle_Washington.JPG"
cost: free
# Each event is a generic "Food Trucks @ <pod>" slot with no per-event image;
# don't queue them in photoGaps (the venue imageUrl above is the intended photo).
skipEventPhotos: true
lookahead: "P30D"
geo: null
calendars:
  # Merged city-wide feed. Kept as the source anchor (see MERGED_CALENDAR in
  # ripper.ts) and tagged only "Food" so its events don't double up in the
  # per-pod "FoodTruck" tag aggregate.
  - name: seattle-food-trucks
    friendlyname: "Seattle Food Trucks"
    timezone: America/Los_Angeles
    tags: ["Food"]
  # Per-pod calendars: one public pod each, tagged ["FoodTruck", "<Neighborhood>"],
  # with a fixed geo so the pod appears in venues.json. expectEmpty: true because
  # a pod legitimately has no bookings in a given week (the merged calendar above
  # is the health sentinel for the source).
  - name: westlake-center
    friendlyname: "Food Trucks @ Westlake Center"
    timezone: America/Los_Angeles
    expectEmpty: true
    tags: ["FoodTruck", "Downtown"]
    geo:
      lat: 47.61142
      lng: -122.3375
      label: "400 Pine St, Seattle, WA 98101"
