name: dacha-theatre
description: "Dacha Theatre"
# Humanitix event pages are JS-rendered; browserbase executes JS to get ticket date links.
# Outofband (rung 2) uses plain fetch and would fail identically to rung 1.
proxy: "browserbase"
url: "https://www.dachatheatre.com/"
friendlyLink: https://www.dachatheatre.com/
geo: null
tags: ["Theatre", "Capitol Hill"]
calendars:
  - name: dacha-theatre
    friendlyname: "Dacha Theatre"
    timezone: America/Los_Angeles
    # Humanitix SPA async data loading is not captured by Browserbase Fetch API;
    # the ripper runs but may produce 0 events until a server-side API is available.
    expectEmpty: true
