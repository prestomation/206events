description: Free weekly summer music and arts series in Fremont, run by the
  501(c)(3) nonprofit Music for Everybody. Headquartered at LTD Bar & Grill
  (21+) with food & drink specials, live acts, DJs, and a silent disco;
  additional pop-up stages appear at other Fremont businesses throughout the
  neighborhood.
