name = "calendar-ripper-favorites"
main = "src/index.ts"
compatibility_date = "2026-02-01"

routes = [
  { pattern = "api.206.events", custom_domain = true }
]

[vars]
GITHUB_PAGES_BASE_URL = "https://206.events"
SITE_URL = "https://206.events"
# Repo that in-app feedback is filed against (Issues created by the worker).
GITHUB_REPO = "prestomation/206events"

[[kv_namespaces]]
binding = "USERS"
id = "d0c3c4e0a14c4a4284de09de18a1136f"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "6b030d7f39ed42a594cf9fe2e6645fe9"

[[kv_namespaces]]
binding = "FAVORITES"
id = "d3d850c6081a4a0490e1e02c34e1c231"

[[kv_namespaces]]
binding = "FEED_TOKENS"
id = "d798d8ad13214ade84fd5692532a7993"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "feed_requests"
