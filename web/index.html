<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#faf8f4" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#17150f" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Browse event calendars from Seattle venues, neighborhoods, and organizations. Subscribe via ICS, add events to Google Calendar, or follow RSS feeds for music, art, markets, community events, and more." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="llms-txt" href="/llms.txt" />
    <title>206.events</title>
    <!-- Pre-paint boot screen: styled inline so it appears on first paint,
         before the JS bundle parses and the app's CSS is applied. React's
         createRoot replaces #root's children on mount, removing it. -->
    <style>
      html, body { margin: 0; }
      body { background: #faf8f4; }
      .boot-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: #faf8f4;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      .boot-logo {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        background: #1a1a2e;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 20px;
        letter-spacing: -0.02em;
        animation: boot-breathe 1.8s ease-in-out infinite;
      }
      .boot-bar {
        position: relative;
        width: 120px;
        height: 3px;
        border-radius: 3px;
        background: rgba(26, 26, 46, 0.15);
        overflow: hidden;
      }
      .boot-bar::after {
        content: '';
        position: absolute;
        top: 0;
        bottom: 0;
        width: 40%;
        border-radius: 3px;
        background: #1366d6;
        animation: boot-slide 1.3s ease-in-out infinite;
      }
      @keyframes boot-breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); } }
      @keyframes boot-slide { 0% { left: -40%; } 100% { left: 100%; } }
      @media (prefers-color-scheme: dark) {
        body, .boot-loader { background: #17150f; }
        .boot-logo { background: #ece6d8; color: #17150f; }
        .boot-bar { background: rgba(236, 230, 216, 0.18); }
        .boot-bar::after { background: #4dabf7; }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot-logo { animation: none; }
        .boot-bar::after { animation: none; left: 0; width: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-loader" role="status" aria-label="Loading 206.events">
        <div class="boot-logo">206</div>
        <div class="boot-bar"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Only load GoatCounter on production, not on PR previews or local dev
      (function() {
        var blocked = ['localhost', '127.0.0.1', 'htmlpreview.github.io'];
        var isPreview = window.location.pathname.indexOf('/preview/') !== -1;
        if (blocked.indexOf(window.location.hostname) === -1 && !isPreview) {
          var s = document.createElement('script');
          s.async = true;
          s.dataset.goatcounter = 'https://seattle-calendars.goatcounter.com/count';
          s.src = 'https://gc.zgo.at/count.js';
          document.head.appendChild(s);
        }
      })();
    </script>
  </body>
</html>
