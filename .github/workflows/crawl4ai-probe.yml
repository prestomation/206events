# TEMPORARY diagnostic workflow — probes whether currently-proxied sources can be
# fetched from a GitHub Actions IP via a plain fetch vs a headless browser
# (crawl4ai's engine). Informs where crawl4ai belongs in the proxy ladder.
# Delete after the crawl4ai-proxy investigation concludes.
name: crawl4ai-probe

on:
  # On-demand only — the investigation is complete (see docs/crawl4ai-proxy-plan.md).
  workflow_dispatch:
    inputs:
      probe_only:
        description: "Comma-separated source names to probe (empty = all)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run probe from CI IP
        env:
          # Set by workflow_dispatch input; empty on push = probe all sources.
          PROBE_ONLY: ${{ github.event.inputs.probe_only }}
        run: |
          set -e
          mkdir -p "$RUNNER_TEMP/probe"
          cp scripts/probe-proxy-sources.mjs "$RUNNER_TEMP/probe/probe.mjs"
          cd "$RUNNER_TEMP/probe"
          npm init -y >/dev/null 2>&1
          npm install playwright@1.60.0
          npx playwright install --with-deps chromium
          node probe.mjs
