# TEMPORARY diagnostic — runs the ACTUAL crawl4ai stealth/undetected browser from
# a GitHub Actions IP against the sgcaptcha-challenge sources, to settle whether
# crawl4ai (not just vanilla Chromium) can clear them in CI. Delete after use.
name: crawl4ai-stealth-probe

on:
  workflow_dispatch: {}
  push:
    branches:
      - claude/crawl4ai-proxy-plan-44ab8h
    paths:
      - "scripts/probe-crawl4ai.py"
      - ".github/workflows/crawl4ai-stealth-probe.yml"

permissions:
  contents: read

jobs:
  stealth-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install crawl4ai + browser
        run: |
          python -m pip install --upgrade pip
          pip install "crawl4ai>=0.5"
          # Installs the Playwright Chromium crawl4ai drives.
          python -m playwright install --with-deps chromium || crawl4ai-setup || true
      - name: Run crawl4ai stealth probe from CI IP
        run: python scripts/probe-crawl4ai.py
