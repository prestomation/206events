name: Secret Scan

# Fast-fail secret scanning, independent of the heavier calendar build. On pull
# requests gitleaks scans only the PR's commits, so pre-existing history is not
# re-flagged. Config lives in .gitleaks.toml.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
