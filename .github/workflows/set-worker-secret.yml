name: Set Worker Secret

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "set-secret"
        type: choice
        options:
          - set-secret
          - create-kv-namespace
      secret_name:
        description: "Worker secret name (for set-secret)"
        required: false
        default: "FEEDBACK_GITHUB_ISSUES_TOKEN"
      secret_value:
        description: "Secret value (for set-secret)"
        required: false
      kv_binding:
        description: "KV binding name (for create-kv-namespace)"
        required: false
        default: "RATE_LIMIT"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        working-directory: infra/favorites-worker
      - name: Set worker secret
        if: inputs.action == 'set-secret'
        run: echo "${{ inputs.secret_value }}" | npx wrangler secret put "${{ inputs.secret_name }}"
        working-directory: infra/favorites-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Create KV namespace
        if: inputs.action == 'create-kv-namespace'
        run: npx wrangler kv namespace create "${{ inputs.kv_binding }}"
        working-directory: infra/favorites-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}