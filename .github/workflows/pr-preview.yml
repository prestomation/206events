name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel an in-progress preview build when a newer commit is pushed to the same
# PR. The group is keyed by PR number, so different PRs never affect each other;
# only a superseded commit's build (which nobody is waiting on) is cancelled.
# This covers the expensive `build` job too — previously only the cheap
# deploy-preview job had cancellation.
concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/build-calendars.yml
    permissions:
      id-token: write    # OIDC token for AWS proxy authentication
      contents: read
    secrets: inherit
    with:
      artifact-name: pr-preview-${{ github.event.number }}

  deploy-preview:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pull-requests: write
    concurrency:
      group: cf-pages-preview-${{ github.event.number }}
      cancel-in-progress: true
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-preview-${{ github.event.number }}
          path: output

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        # CLOUDFLARE_PAGES_PROJECT repo var overrides the project name for
        # template copies; defaults to the reference instance's project.
        run: |
          DEPLOYMENT_URL=$(npx wrangler pages deploy output/ --project-name="${PAGES_PROJECT}" --branch="pr-${{ github.event.number }}" 2>&1 | tee /dev/stderr | grep -oE "https://[a-z0-9-]+\.${PAGES_PROJECT}\.pages\.dev" | head -1)
          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "ERROR: Failed to extract deployment URL from wrangler output"
            exit 1
          fi
          echo "deployment-url=${DEPLOYMENT_URL}" >> "$GITHUB_OUTPUT"
          echo "${DEPLOYMENT_URL}" > output/deployment-url.txt
        env:
          PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || '206events' }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment PR with preview link
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes('📅 Calendar Preview')
            );

            const errorCount = '${{ needs.build.outputs.error-count }}';
            const previewUrl = `${{ steps.deploy.outputs.deployment-url }}` || `https://pr-${{ github.event.number }}.${{ vars.CLOUDFLARE_PAGES_PROJECT || '206events' }}.pages.dev`;

            const zeroEventCalendarsRaw = `${{ needs.build.outputs.zero-event-calendars }}`;
            const zeroEventCalendars = zeroEventCalendarsRaw.trim().split('\n').filter(Boolean);
            const zeroEventSection = zeroEventCalendars.length > 0
              ? `\n\n<details>\n<summary>⚠️ ${zeroEventCalendars.length} calendar(s) with 0 events</summary>\n\n${zeroEventCalendars.map(c => `- \`${c}\``).join('\n')}\n\n</details>`
              : '\n\n✅ All calendars have events';

            // Read build-errors.json for detailed error breakdown
            let buildErrors = { configErrors: [], sources: [], externalCalendarFailures: [] };
            try {
              buildErrors = JSON.parse(fs.readFileSync('output/build-errors.json', 'utf8'));
            } catch (e) {
              // File unavailable or parse failed — skip detailed breakdown
            }

            // Build the status badge from the split counts so the headline
            // doesn't conflate parse errors (real bugs) with uncertainty
            // (agent todos, non-fatal). Uncertainty still counts toward
            // `totalErrors` per the design — we just label it distinctly.
            const parseErrorTotal = (buildErrors.sources || []).reduce(
              (a, s) => a + (s.parseErrorCount ?? s.errorCount ?? 0), 0
            ) + (buildErrors.configErrors || []).length
              + (buildErrors.externalCalendarFailures || []).length
              + (buildErrors.geocodeErrors || []).length;
            const uncertaintyOutstanding = buildErrors.uncertaintyStats?.outstanding ?? 0;
            const proxyStaleServes = buildErrors.proxyStaleServes || [];
            const badgeParts = [];
            if (parseErrorTotal > 0) badgeParts.push(`❌ ${parseErrorTotal} parse error(s)`);
            if (uncertaintyOutstanding > 0) badgeParts.push(`❓ ${uncertaintyOutstanding} uncertain`);
            if (proxyStaleServes.length > 0) badgeParts.push(`🕒 ${proxyStaleServes.length} stale browserbase`);
            const errorBadge = badgeParts.length > 0 ? badgeParts.join(' · ') : '✅ No errors';

            const unexpectedNonEmpty = buildErrors.unexpectedNonEmptyCalendars || [];
            const unexpectedNonEmptySection = unexpectedNonEmpty.length > 0
              ? `\n\n<details>\n<summary>ℹ️ ${unexpectedNonEmpty.length} calendar(s) marked expectEmpty but have events</summary>\n\n${unexpectedNonEmpty.map(c => `- \`${c.name}\`: ${c.events} events — consider removing expectEmpty`).join('\n')}\n\n</details>`
              : '';

            // New zero-event sources that have never appeared in production
            const newZeroEventSourcesRaw = `${{ needs.build.outputs.new-zero-event-sources }}`;
            const newZeroEventSources = newZeroEventSourcesRaw.trim().split('\n').filter(Boolean);
            const newZeroEventSourcesSection = newZeroEventSources.length > 0
              ? `\n\n🚫 **${newZeroEventSources.length} new source(s) with 0 events that have never appeared in production.** These will fail the build:\n${newZeroEventSources.map(s => `- \`${s}\``).join('\n')}\n\nRemove them or fix the ripper type/URL.`
              : '';

            // New sources with parse errors that are not yet in production
            const newSourceParseErrors = buildErrors.newSourceParseErrors || [];
            const newSourceParseErrorsSection = newSourceParseErrors.length > 0
              ? `\n\n🚫 **${newSourceParseErrors.length} new source(s) with parse errors.** These must be fixed before merging:\n${newSourceParseErrors.map(s => `- \`${s.source}/${s.calendar}\`: ${s.errorCount} parse error(s)`).join('\n')}`
              : '';

            // HTML entities (&amp; etc.) in URL fields — always fatal (a broken
            // link). Fix: decode in the ripper or write the literal in YAML.
            const urlEntityErrors = buildErrors.urlEntityErrors || [];
            const urlEntitySection = urlEntityErrors.length > 0
              ? `\n\n🔗 **${urlEntityErrors.length} URL field(s) contain HTML entities.** These must be fixed before merging — decode the entity in the ripper (\`html-entities\`) or write the literal character in YAML:\n${urlEntityErrors.map(e => `- \`${e.source}${e.calendar ? '/' + e.calendar : ''}\` ${e.field} (${e.entities.join(', ')}): ${e.value}`).join('\n')}`
              : '';

            // Geo coverage stats
            const geoStats = buildErrors.geoStats;
            const geoSection = geoStats
              ? `\n\n**🗺️ Geo coverage:** ${geoStats.eventsWithGeo.toLocaleString()} / ${geoStats.totalEvents.toLocaleString()} events (${Math.round(geoStats.eventsWithGeo / geoStats.totalEvents * 100)}%)` +
                (geoStats.geocodeErrors > 0 ? ` — ⚠️ ${geoStats.geocodeErrors} geocode error(s)` : ' — ✅ No geocode errors')
              : '';

            // Cache effectiveness — a low hit rate means a cold cache, which is
            // the usual cause of a slow preview build. See docs/fetch-cache.md.
            const cacheStats = buildErrors.cacheStats;
            // Proactive-refresh detail only appears on main builds (PR previews
            // never refresh, so forcedRefresh is 0 and this stays empty).
            const proactiveSuffix = cacheStats && cacheStats.fetch.forcedRefresh > 0
              ? `; proactive refresh ${cacheStats.fetch.forcedRefreshApplied}/${cacheStats.fetch.forcedRefresh} applied of ${cacheStats.fetch.cacheSize.toLocaleString()} cached`
              : '';
            const cacheSection = cacheStats
              ? `\n\n**💾 Cache:** fetch ${cacheStats.fetch.hitRate}% hit (${cacheStats.fetch.freshHits.toLocaleString()} fresh / ${cacheStats.fetch.liveFetches.toLocaleString()} live` +
                (cacheStats.fetch.liveFailures > 0 ? `, ${cacheStats.fetch.liveFailures} failed→stale` : '') +
                `)${proactiveSuffix} · geocode ${cacheStats.geocode.hitRate}% no-network (${cacheStats.geocode.nominatimCalls.toLocaleString()} Nominatim call(s))`
              : '';

            // Photo coverage stats. Gaps are todos for the photo-resolver
            // skill — informational, not a build-block.
            const photoStats = buildErrors.photoStats;
            const photoGaps = buildErrors.photoGaps || { venueGaps: [], eventGaps: [] };
            let photoSection = '';
            if (photoStats && (photoStats.totalEvents > 0 || photoStats.totalVenues > 0)) {
              const evPct = photoStats.totalEvents > 0 ? Math.round(photoStats.eventsWithImage / photoStats.totalEvents * 100) : 0;
              const vnPct = photoStats.totalVenues > 0 ? Math.round(photoStats.venuesWithImage / photoStats.totalVenues * 100) : 0;
              const gapCount = (photoGaps.venueGaps?.length || 0) + (photoGaps.eventGaps?.length || 0);
              photoSection = `\n\n**🖼️ Photo coverage:** ${photoStats.eventsWithImage.toLocaleString()} / ${photoStats.totalEvents.toLocaleString()} events (${evPct}%), ${photoStats.venuesWithImage.toLocaleString()} / ${photoStats.totalVenues.toLocaleString()} venues (${vnPct}%)` +
                (gapCount > 0 ? ` — ${gapCount} missing (run the photo-resolver skill)` : ' — ✅ Fully covered');
            }

            // Cost coverage stats. Gaps are todos for the cost-resolver
            // skill — informational, not a build-block.
            const costStats = buildErrors.costStats;
            const costGaps = buildErrors.costGaps || [];
            let costSection = '';
            if (costStats && costStats.totalEvents > 0) {
              const costPct = Math.round(costStats.eventsWithCost / costStats.totalEvents * 100);
              const soldOut = costStats.soldOutEvents || 0;
              costSection = `\n\n**💲 Cost coverage:** ${costStats.eventsWithCost.toLocaleString()} / ${costStats.totalEvents.toLocaleString()} events (${costPct}%), ${costStats.freeEvents.toLocaleString()} free, ${soldOut.toLocaleString()} sold out` +
                (costGaps.length > 0 ? ` — ${costGaps.length.toLocaleString()} missing (run the cost-resolver skill)` : ' — ✅ Fully covered');
            }

            // Outdoor-setting coverage (weather badges). Gaps are todos for
            // the setting-resolver skill — informational, not a build-block.
            const settingStats = buildErrors.settingStats;
            const settingGaps = buildErrors.settingGaps || { venueGaps: [], eventGaps: [] };
            let settingSection = '';
            if (settingStats && settingStats.totalEvents > 0) {
              const vGaps = settingGaps.venueGaps?.length || 0;
              const eGaps = settingGaps.eventGaps?.length || 0;
              settingSection = `\n\n**🌤️ Weather badges:** ${settingStats.badgedEvents.toLocaleString()} event(s) badged, ${settingStats.classifiedEvents.toLocaleString()} / ${settingStats.totalEvents.toLocaleString()} with a known setting` +
                (vGaps + eGaps > 0 ? ` — ${vGaps} venue(s) + ${eGaps} event(s) awaiting classification (run the setting-resolver skill)` : ' — no classification queue');
            }

            // Event-uncertainty stats. Outstanding entries are todos for
            // the event-uncertainty-resolver skill — informational, not
            // a build-block.
            const uStats = buildErrors.uncertaintyStats;
            const uEvents = buildErrors.uncertainEvents || [];
            let uncertaintySection = '';
            if (uStats && (uStats.outstanding + uStats.resolvedFromCache + uStats.acknowledgedUnresolvable > 0)) {
              const summary = `**❓ Uncertain events:** ${uStats.outstanding} outstanding, ${uStats.resolvedFromCache} resolved from cache, ${uStats.acknowledgedUnresolvable} unresolvable`;
              if (uEvents.length > 0) {
                const sample = uEvents.slice(0, 20).map(e => {
                  const link = e.event.url ? `[link](${e.event.url})` : '—';
                  const fields = e.unknownFields.join(', ');
                  return `- \`${e.source}\` ${e.event.summary} (${e.event.date}) — missing: ${fields} ${link}`;
                }).join('\n');
                const more = uEvents.length > 20 ? `\n\n_…and ${uEvents.length - 20} more. Run the event-uncertainty-resolver skill to investigate._` : '\n\n_Run the event-uncertainty-resolver skill to investigate._';
                uncertaintySection = `\n\n${summary}\n<details>\n<summary>Show outstanding entries</summary>\n\n${sample}${more}\n\n</details>`;
              } else {
                uncertaintySection = `\n\n${summary}`;
              }
            }

            // Cross-source duplicate de-duplication. HIGH matches are merged
            // automatically; MED candidates are todos for the duplicate-resolver
            // skill — informational, not a build-block.
            const dupStats = buildErrors.duplicateStats;
            const dupCandidates = buildErrors.duplicateCandidates || [];
            let duplicateSection = '';
            if (dupStats && (dupStats.merged > 0 || dupStats.candidates > 0)) {
              const summary = `**🔀 Cross-source duplicates:** ${dupStats.merged.toLocaleString()} merged across ${dupStats.groups.toLocaleString()} event(s), ${dupStats.candidates.toLocaleString()} candidate(s) pending review`;
              if (dupCandidates.length > 0) {
                const sample = dupCandidates.slice(0, 20).map(c => {
                  const [a, b] = c.events;
                  const d = c.score.distanceM == null ? 'no coords' : `${c.score.distanceM}m`;
                  return `- \`${a.icsUrl}\` ${a.summary} ⟷ \`${b.icsUrl}\` ${b.summary} (${d})`;
                }).join('\n');
                const more = dupCandidates.length > 20 ? `\n\n_…and ${dupCandidates.length - 20} more. Run the duplicate-resolver skill to investigate._` : '\n\n_Run the duplicate-resolver skill to investigate._';
                duplicateSection = `\n\n${summary}\n<details>\n<summary>Show candidate pairs</summary>\n\n${sample}${more}\n\n</details>`;
              } else {
                duplicateSection = `\n\n${summary}`;
              }
            }

            // Proxy escalation-ladder verification queue. Non-fatal: proxy
            // sources still climbing outofband → browserbase → disabled. The
            // proxy-escalation skill (run by the out-of-band job) drives them.
            const pendingProxy = buildErrors.pendingProxyVerification || [];
            let proxyVerificationSection = '';
            if (pendingProxy.length > 0) {
              const promote = pendingProxy.filter(p => p.recommendation === 'promote-to-browserbase').length;
              const retire = pendingProxy.filter(p => p.recommendation === 'retire').length;
              const rows = pendingProxy.map(p =>
                `| \`${p.name}\` | ${p.rung} | ${p.consecutiveFailures} | ${p.recommendation} | ${p.lastError || '—'} |`
              ).join('\n');
              const badge = `**🪜 Proxy verification:** ${pendingProxy.length} pending` +
                (promote ? `, ${promote} due to promote to browserbase` : '') +
                (retire ? `, ${retire} due to retire` : '');
              proxyVerificationSection = `\n\n${badge}\n<details>\n<summary>Show proxy-ladder queue</summary>\n\n| Source | Rung | Consecutive failures | Recommendation | Last error |\n|--------|------|----------------------|----------------|------------|\n${rows}\n\n_The proxy-escalation skill escalates a source after ${'`'}3${'`'} consecutive failures._\n\n</details>`;
            }

            // Stale serves: a source whose live fetch failed and was satisfied
            // from a cached copy older than the TTL. Counted in totalErrors.
            // See docs/fetch-cache.md.
            let proxyStaleSection = '';
            if (proxyStaleServes.length > 0) {
              const rows = proxyStaleServes.map(s =>
                `| \`${s.source || s.url}\` | ${s.ageHours}h | ${s.cachedAt} | ${s.error} |`
              ).join('\n');
              proxyStaleSection = `\n\n**🕒 ${proxyStaleServes.length} source(s) served from stale cache.** The live fetch failed and a copy older than the TTL was used — investigate the source.\n<details>\n<summary>Show stale serves</summary>\n\n| Source | Age | Cached at | Error |\n|--------|-----|-----------|-------|\n${rows}\n\n</details>`;
            }

            // New source summary — event counts and sample events for sources not in production
            let newSourceSection = '\n\n✅ No new sources in this PR';
            try {
              const newSourceSummary = JSON.parse(fs.readFileSync('output/new-source-summary.json', 'utf8'));
              if (newSourceSummary.length > 0) {
                const typeLabel = (t) => t === 'External' ? 'External' : t === 'Recurring' ? 'Recurring' : 'Ripper';
                const formatDate = (dateStr) => {
                  try {
                    const d = new Date(dateStr);
                    if (isNaN(d.getTime())) return dateStr;
                    return d.toLocaleString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true });
                  } catch { return dateStr; }
                };
                const parts = newSourceSummary.map(s => {
                  const header = `**${s.source}** (${typeLabel(s.type)}) — ${s.eventCount} events`;
                  if (s.sampleEvents.length > 0) {
                    const rows = s.sampleEvents.map(e =>
                      `| ${e.summary} | ${formatDate(e.date)} | ${e.location || '—'} |`
                    ).join('\n');
                    return `${header}\n<details>\n<summary>Sample events</summary>\n\n| Event | Date | Location |\n|-------|------|----------|\n${rows}\n\n</details>`;
                  }
                  return header;
                });
                newSourceSection = `\n\n## 🆕 New Sources in This PR\n\n${parts.join('\n\n')}`;
              }
            } catch (e) {
              // new-source-summary.json not available — show default
            }

            let errorSection = '';
            if (parseInt(errorCount) > 0) {
              const lines = [];
              const configErrors = buildErrors.configErrors || [];
              const sourceErrors = buildErrors.sources || [];
              const externalFailures = buildErrors.externalCalendarFailures || [];

              if (configErrors.length > 0) {
                lines.push(`**Config errors (${configErrors.length}):**`);
                configErrors.forEach(e => {
                  lines.push(`- \`${e.path || e.type || 'unknown'}\`: ${e.reason || 'No reason provided'}`);
                });
                lines.push('');
              }

              // Show only calendars with real parse errors here (uncertainty
              // errors already appear in their own "❓ Uncertain events"
              // section above, so listing them again under "Parse errors"
              // would be double-counting). `parseErrorCount` is the new
              // breakout field; fall back to errorCount for older builds.
              const sourceParseErrors = sourceErrors
                .map(s => ({ ...s, _parse: s.parseErrorCount ?? s.errorCount ?? 0 }))
                .filter(s => s._parse > 0);
              if (sourceParseErrors.length > 0) {
                const totalSourceErrors = sourceParseErrors.reduce((a, s) => a + s._parse, 0);
                lines.push(`**Parse errors in ${sourceParseErrors.length} calendar(s) (${totalSourceErrors} total):**`);
                sourceParseErrors.forEach(s => {
                  lines.push(`- \`${s.source || 'unknown'}/${s.calendar || 'unknown'}\`: ${s._parse} parse error(s)`);
                });
                lines.push('');
              }

              if (externalFailures.length > 0) {
                lines.push(`**External calendar failures (${externalFailures.length}):**`);
                externalFailures.forEach(f => {
                  lines.push(`- \`${f.name || 'unknown'}\`: ${f.error || 'Unknown error'}`);
                });
                lines.push('');
              }

              if (lines.length > 0) {
                errorSection = `\n\n<details>\n<summary>🔍 ${errorCount} error(s) — click to expand</summary>\n\n${lines.join('\n')}\n</details>`;
              }
            }

            const body = [
              '## 📅 Calendar Preview',
              '',
              `**Status:** ${errorBadge}`,
              `**Preview:** [View Calendar Index](${previewUrl})`,
              `**Commit:** ${{ github.event.pull_request.head.sha }}`,
              geoSection,
              cacheSection,
              photoSection,
              costSection,
              settingSection,
              uncertaintySection,
              duplicateSection,
              proxyVerificationSection,
              proxyStaleSection,
              newSourceSection,
              errorSection,
              zeroEventSection,
              unexpectedNonEmptySection,
              newZeroEventSourcesSection,
              newSourceParseErrorsSection,
              urlEntitySection,
              '',
              '> 🔗 Preview deployed to Cloudflare Pages'
            ].join('\n');

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

  # Detects whether this PR touches the web app or the perf-measurement
  # harness itself. Lighthouse/boot-profile below are expensive (Chromium
  # install + multiple runs) and only meaningful when the built bundle could
  # have changed — most PRs here are calendar-source-only and never touch
  # web/. Uses the GitHub API (no checkout) so it's fast and adds no new
  # third-party action.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      web: ${{ steps.filter.outputs.web }}
    steps:
      - name: Check for web app changes
        id: filter
        uses: actions/github-script@v7
        with:
          script: |
            const patterns = [
              /^web\//,
              // inject-sw-assets.mjs runs as the last step of `npm run web:build`
              // (see package.json) and mutates the deployed bundle directly.
              /^scripts\/(lighthouse-report|boot-profile-report|inject-sw-assets)\.mjs$/,
              // build-calendars.yml is included because it's the reusable
              // workflow whose "Build web interface" step (`npm run web:build`)
              // produces the artifact deploy-preview publishes.
              /^\.github\/workflows\/(pr-preview|web-lighthouse-baseline|web-boot-profile-baseline|build-calendars)\.yml$/,
            ];
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });
            const changed = files.some(f => patterns.some(p => p.test(f.filename)));
            core.setOutput('web', changed ? 'true' : 'false');
            core.notice(`web app changed: ${changed} (${files.length} file(s) in PR)`);

  # Lighthouse (lab) performance audit against the deployed preview — real CDN,
  # Brotli, and real data, which a data-mocked local `vite preview` can't give.
  # Informational: warn-only assertions, median of runs to damp runner noise
  # (see web/lighthouserc.json). Skipped when there's no preview URL (e.g.
  # template copies without Cloudflare Pages secrets) or the PR doesn't touch
  # the web app (see the `changes` job above), so it never blocks them.
  # Posts/updates a single PR comment with the scores, the delta vs the previous
  # push on this PR (stored in the comment), and the delta vs the main baseline
  # (restored from the cache that web-lighthouse-baseline.yml saves on main).
  # See docs/web-performance-plan.md and docs/web-performance-measurement-impl.md.
  lighthouse:
    runs-on: ubuntu-latest
    needs: [deploy-preview, changes]
    if: needs.deploy-preview.outputs.deployment-url != '' && needs.changes.outputs.web == 'true'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Lighthouse CI
        id: lhci
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ needs.deploy-preview.outputs.deployment-url }}
          configPath: ./web/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      # Restore the latest main-branch baseline (saved by
      # web-lighthouse-baseline.yml). Caches created on the default branch are
      # readable from PR runs; the exact key never matches, so the prefix
      # restore-key pulls the newest. Cold/absent cache → no baseline column.
      - name: Restore main Lighthouse baseline
        uses: actions/cache/restore@v4
        with:
          path: lighthouse-baseline
          key: lighthouse-baseline-v1-${{ github.run_id }}
          restore-keys: |
            lighthouse-baseline-v1-

      - name: Post Lighthouse trend comment
        uses: actions/github-script@v7
        # Pass the action's outputs via env (not string-interpolated into the
        # script) — GitHub's hardening guidance, and it can't break the script
        # if a value ever contains a quote.
        env:
          LH_RESULTS_PATH: ${{ steps.lhci.outputs.resultsPath }}
          LH_LINKS: ${{ steps.lhci.outputs.links }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { pathToFileURL } = require('url');
            const { extractMetrics, parseEmbeddedTrend, buildComment, COMMENT_MARKER } =
              await import(pathToFileURL(`${process.env.GITHUB_WORKSPACE}/scripts/lighthouse-report.mjs`).href);

            const resultsPath = process.env.LH_RESULTS_PATH || '.lighthouseci';
            let manifest;
            try {
              manifest = JSON.parse(fs.readFileSync(path.join(resultsPath, 'manifest.json'), 'utf8'));
            } catch (e) {
              core.warning(`No Lighthouse manifest at ${resultsPath}: ${e.message}`);
              return;
            }
            const lhrByPath = {};
            for (const entry of manifest) {
              try { lhrByPath[entry.jsonPath] = JSON.parse(fs.readFileSync(entry.jsonPath, 'utf8')); } catch {}
            }
            const current = extractMetrics(manifest, lhrByPath);

            let reportUrl = null;
            try {
              const links = JSON.parse(process.env.LH_LINKS || '{}');
              reportUrl = Object.values(links)[0] || null;
            } catch {}

            let baselineMain = null;
            try { baselineMain = JSON.parse(fs.readFileSync('lighthouse-baseline/metrics.json', 'utf8')); } catch {}

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes(`<!-- ${COMMENT_MARKER}`));
            const prev = existing ? parseEmbeddedTrend(existing.body) : null;

            const { markdown } = buildComment({
              current,
              previous: prev?.current || null,
              priorHistory: prev?.history || [],
              baselineMain,
              reportUrl,
              meta: { sha: context.payload.pull_request.head.sha, ts: new Date().toISOString() },
            });

            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body: markdown });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body: markdown });
            }

  # Boot-interactivity profile against the deployed preview: post-splash
  # main-thread long tasks and tap responsiveness while the full events index
  # lands — the window Lighthouse's initial-load audit can't see (it never taps
  # mid-swap; its lab INP is null). Same posture as the lighthouse job above:
  # informational/warn-only, skipped without a preview URL or when the PR
  # doesn't touch the web app (see the `changes` job above), one upserted PR
  # comment trending vs the previous push (embedded in the comment) and vs the
  # main baseline (Actions cache, saved by web-boot-profile-baseline.yml).
  # See docs/web-boot-profiling-ci.md.
  boot-profile:
    runs-on: ubuntu-latest
    needs: [deploy-preview, changes]
    if: needs.deploy-preview.outputs.deployment-url != '' && needs.changes.outputs.web == 'true'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Install Chromium
        working-directory: web
        run: npx playwright install chromium --with-deps

      - name: Profile the deployed preview
        working-directory: web
        run: node scripts/boot-profile.mjs "$PREVIEW_URL" --runs 3 --out ../boot-profile/metrics.json
        env:
          PREVIEW_URL: ${{ needs.deploy-preview.outputs.deployment-url }}

      # Restore the latest main-branch baseline (saved by
      # web-boot-profile-baseline.yml). Caches created on the default branch
      # are readable from PR runs; the exact key never matches, so the prefix
      # restore-key pulls the newest. Cold/absent cache → no baseline column.
      - name: Restore main boot-profile baseline
        uses: actions/cache/restore@v4
        with:
          path: boot-profile-baseline
          key: boot-profile-baseline-v1-${{ github.run_id }}
          restore-keys: |
            boot-profile-baseline-v1-

      - name: Post boot-profile trend comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { pathToFileURL } = require('url');
            const { parseEmbeddedTrend, buildComment, COMMENT_MARKER } =
              await import(pathToFileURL(`${process.env.GITHUB_WORKSPACE}/scripts/boot-profile-report.mjs`).href);

            let current;
            try {
              current = JSON.parse(fs.readFileSync('boot-profile/metrics.json', 'utf8')).metrics;
            } catch (e) {
              core.warning(`No boot-profile metrics: ${e.message}`);
              return;
            }

            let baselineMain = null;
            try { baselineMain = JSON.parse(fs.readFileSync('boot-profile-baseline/metrics.json', 'utf8')); } catch {}

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes(`<!-- ${COMMENT_MARKER}`));
            const prev = existing ? parseEmbeddedTrend(existing.body) : null;

            const { markdown } = buildComment({
              current,
              previous: prev?.current || null,
              priorHistory: prev?.history || [],
              baselineMain,
              reportUrl: null,
              meta: { sha: context.payload.pull_request.head.sha, ts: new Date().toISOString() },
            });

            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body: markdown });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body: markdown });
            }
